name: Build - Win

on:
  workflow_dispatch:
  # push:
  #   tags:
  #     - v*

env:
  ACTIONS_ALLOW_UNSECURE_COMMANDS: true

jobs:
  build-windows:
    runs-on: windows-2022
    strategy:
      matrix:
        node-version: [18]
        arch: [x64, x86, arm64]
        include:
          - arch: x64
            vcpkg_triplet: x64-windows-static
            msvc_arch: amd64
            node_arch: x64
          - arch: x86
            vcpkg_triplet: x86-windows-static
            msvc_arch: amd64_x86
            node_arch: x86
          - arch: arm64
            vcpkg_triplet: arm64-windows-static
            msvc_arch: amd64_arm64
            node_arch: arm64

    steps:
      - uses: actions/checkout@v4

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: ${{ matrix.msvc_arch }}

      - name: Setup vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgGitCommitId: 'master'

      - name: Install OpenSSL via vcpkg
        run: |
          vcpkg install openssl:${{ matrix.vcpkg_triplet }}
        shell: cmd

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          architecture: ${{ matrix.node_arch }}

      - name: Set up build environment
        run: |
          echo "Setting up build environment for ${{ matrix.arch }}"
          # Set npm config for target architecture
          npm config set target_arch ${{ matrix.arch }}
          npm config set target_platform win32
          npm config set build_from_source true

          # Set vcpkg environment variables
          echo "VCPKG_ROOT=$env:VCPKG_ROOT" >> $env:GITHUB_ENV
          echo "VCPKG_DEFAULT_TRIPLET=${{ matrix.vcpkg_triplet }}" >> $env:GITHUB_ENV

          # Set OpenSSL paths for vcpkg
          $vcpkgRoot = $env:VCPKG_ROOT
          $opensslRoot = "$vcpkgRoot\installed\${{ matrix.vcpkg_triplet }}"
          echo "OPENSSL_ROOT_DIR=$opensslRoot" >> $env:GITHUB_ENV
          echo "OPENSSL_INCLUDE_DIR=$opensslRoot\include" >> $env:GITHUB_ENV
          echo "OPENSSL_LIB_DIR=$opensslRoot\lib" >> $env:GITHUB_ENV
        shell: pwsh
        env:
          npm_config_arch: ${{ matrix.arch }}
          npm_config_target_arch: ${{ matrix.arch }}

      - name: Build
        run: npm install --build-from-source
        env:
          CI: true
          npm_config_arch: ${{ matrix.arch }}
          npm_config_target_arch: ${{ matrix.arch }}
          VCPKG_DEFAULT_TRIPLET: ${{ matrix.vcpkg_triplet }}

      - name: Test
        run: npm run test
        env:
          CI: true

      - name: Upload
        run: node_modules/.bin/prebuild -r napi --upload -u ${{ secrets.GITHUB_TOKEN }}
        env:
          CI: true
          npm_config_arch: ${{ matrix.arch }}
          npm_config_target_arch: ${{ matrix.arch }}
